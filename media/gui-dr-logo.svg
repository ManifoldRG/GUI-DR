<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&amp;display=swap');

      .bg { fill: #0d1117; }

      /* Window frames */
      .win { fill: none; stroke-width: 1.5; rx: 6; ry: 6; }
      .win3 { stroke: rgba(34,211,238,0.2); fill: rgba(34,211,238,0.03); }
      .win2 { stroke: rgba(34,211,238,0.4); fill: rgba(34,211,238,0.05); }
      .win1 { stroke: rgba(34,211,238,0.75); fill: #0d1117; }
      .titlebar { fill: rgba(34,211,238,0.1); }
      .titlebar-line { stroke: rgba(34,211,238,0.25); stroke-width: 1; }

      /* Dots */
      .dot { opacity: 0; }

      /* Brand text */
      .brand {
        font-family: 'Space Mono', 'Courier New', monospace;
        font-weight: 700;
        font-size: 42px;
        letter-spacing: 5px;
        fill: #e6edf3;
      }
      .brand-accent { fill: #22d3ee; }
      .sub {
        font-family: 'Space Mono', 'Courier New', monospace;
        font-weight: 400;
        font-size: 9.5px;
        letter-spacing: 1.2px;
        fill: #4a5568;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes dotPulse {
        0%,100% { opacity: 0.15; r: 3; }
        50%      { opacity: 0.9;  r: 4.5; }
      }

      @keyframes winSlideIn {
        from { opacity: 0; transform: translate(-6px, 6px); }
        to   { opacity: 1; transform: translate(0,0); }
      }

      .win3-g { animation: winSlideIn 0.6s ease 0.1s both; }
      .win2-g { animation: winSlideIn 0.6s ease 0.25s both; }
      .win1-g { animation: winSlideIn 0.6s ease 0.4s both; }

      .text-g  { animation: fadeIn 0.7s ease 0.8s both; }
      .sub-g   { animation: fadeIn 0.7s ease 1.1s both; }

      /* Per-dot animation delays baked in below */
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="520" height="200" rx="10"/>

  <!-- ═══ ICON: Stacked Windows ═══ -->

  <!-- Window 3 (back) -->
  <g class="win3-g">
    <rect class="win win3" x="20" y="46" width="120" height="92" rx="6"/>
  </g>

  <!-- Window 2 (mid) -->
  <g class="win2-g">
    <rect class="win win2" x="30" y="36" width="120" height="92" rx="6"/>
  </g>

  <!-- Window 1 (front) -->
  <g class="win1-g">
    <rect class="win win1" x="40" y="26" width="120" height="92" rx="6"/>
    <!-- title bar bg -->
    <rect class="titlebar" x="40" y="26" width="120" height="20" rx="6"/>
    <rect class="titlebar" x="40" y="36" width="120" height="10"/>
    <line class="titlebar-line" x1="40" y1="46" x2="160" y2="46"/>
    <!-- traffic light dots -->
    <circle cx="54" cy="36" r="4" fill="rgba(34,211,238,0.5)"/>
    <circle cx="67" cy="36" r="4" fill="rgba(34,211,238,0.3)"/>
    <circle cx="80" cy="36" r="4" fill="rgba(34,211,238,0.15)"/>

    <!-- Randomized animated dots inside window -->
    <!-- Row 1 -->
    <circle class="dot" cx="57"  cy="58" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.1s" repeatCount="indefinite" begin="0.0s"/><animate attributeName="r" values="3;4.5;3" dur="2.1s" repeatCount="indefinite" begin="0.0s"/></circle>
    <circle class="dot" cx="70"  cy="58" r="3"   fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="1.8s" repeatCount="indefinite" begin="0.3s"/><animate attributeName="r" values="2.5;4;2.5" dur="1.8s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle class="dot" cx="83"  cy="58" r="4"   fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.4s" repeatCount="indefinite" begin="0.6s"/><animate attributeName="r" values="3.5;5;3.5" dur="2.4s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle class="dot" cx="96"  cy="58" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="1.6s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle class="dot" cx="109" cy="58" r="3.5" fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.75;0.15" dur="2.2s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle class="dot" cx="122" cy="58" r="3"   fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="1.9s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle class="dot" cx="140" cy="58" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.3s" repeatCount="indefinite" begin="0.7s"/></circle>
    <!-- Row 2 -->
    <circle class="dot" cx="57"  cy="72" r="2.5" fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.0s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle class="dot" cx="70"  cy="72" r="4"   fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="1.7s" repeatCount="indefinite" begin="0.1s"/><animate attributeName="r" values="3.5;5;3.5" dur="1.7s" repeatCount="indefinite" begin="0.1s"/></circle>
    <circle class="dot" cx="83"  cy="72" r="3"   fill="#86efac"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.5s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle class="dot" cx="96"  cy="72" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="2.1s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle class="dot" cx="109" cy="72" r="2.5" fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.75;0.15" dur="1.8s" repeatCount="indefinite" begin="1.0s"/></circle>
    <circle class="dot" cx="122" cy="72" r="4"   fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.3s" repeatCount="indefinite" begin="0.2s"/><animate attributeName="r" values="3.5;5;3.5" dur="2.3s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle class="dot" cx="140" cy="72" r="3"   fill="#86efac"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.0s" repeatCount="indefinite" begin="0.6s"/></circle>
    <!-- Row 3 -->
    <circle class="dot" cx="57"  cy="86" r="4"   fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="2.2s" repeatCount="indefinite" begin="0.7s"/><animate attributeName="r" values="3.5;5;3.5" dur="2.2s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle class="dot" cx="70"  cy="86" r="2.5" fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="1.9s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle class="dot" cx="83"  cy="86" r="3.5" fill="#86efac"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.0s" repeatCount="indefinite" begin="0.0s"/></circle>
    <circle class="dot" cx="96"  cy="86" r="3"   fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.4s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle class="dot" cx="109" cy="86" r="4"   fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="1.7s" repeatCount="indefinite" begin="0.5s"/><animate attributeName="r" values="3.5;5;3.5" dur="1.7s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle class="dot" cx="122" cy="86" r="2.5" fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.75;0.15" dur="2.1s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle class="dot" cx="140" cy="86" r="3"   fill="#86efac"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.3s" repeatCount="indefinite" begin="0.8s"/></circle>
    <!-- Row 4 -->
    <circle class="dot" cx="57"  cy="100" r="3"   fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.0s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle class="dot" cx="70"  cy="100" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="1.8s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle class="dot" cx="83"  cy="100" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.5s" repeatCount="indefinite" begin="1.0s"/></circle>
    <circle class="dot" cx="96"  cy="100" r="4"   fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="2.1s" repeatCount="indefinite" begin="0.1s"/><animate attributeName="r" values="3.5;5;3.5" dur="2.1s" repeatCount="indefinite" begin="0.1s"/></circle>
    <circle class="dot" cx="109" cy="100" r="3"   fill="#fbbf24"><animate attributeName="opacity" values="0.15;0.75;0.15" dur="1.9s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle class="dot" cx="122" cy="100" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.2s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle class="dot" cx="140" cy="100" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.0s" repeatCount="indefinite" begin="0.0s"/></circle>
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <g class="text-g">
    <!-- GUI-DR -->
    <text class="brand" x="185" y="90">
      <tspan fill="#e6edf3">GUI-</tspan><tspan class="brand-accent">DR</tspan>
    </text>
  </g>

  <!-- Divider line -->
  <g class="sub-g">
    <line x1="185" y1="100" x2="500" y2="100" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
    <!-- Tagline — split into two lines for readability -->
    <text class="sub" x="185" y="118">a data augmentation pipeline</text>
    <text class="sub" x="185" y="133">for GUI grounding stress test</text>
  </g>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&amp;display=swap');

      .bg { fill: #0d1117; }

      .win3 { fill: rgba(34,211,238,0.03); stroke: rgba(34,211,238,0.18); stroke-width: 1.5; }
      .win2 { fill: rgba(34,211,238,0.05); stroke: rgba(34,211,238,0.35); stroke-width: 1.5; }
      .win1 { fill: #0d1117;              stroke: rgba(34,211,238,0.72); stroke-width: 1.5; }

      .titlebar-fill { fill: rgba(34,211,238,0.10); }
      .titlebar-line { stroke: rgba(34,211,238,0.22); stroke-width: 1; fill: none; }

      .brand-word {
        font-family: 'Ubuntu', 'Liberation Sans', Arial, sans-serif;
        font-size: 46px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .brand-main   { fill: #e6edf3; }
      .brand-accent { fill: #22d3ee; }

      .divider { stroke: rgba(34,211,238,0.18); stroke-width: 1; }

      .tagline {
        font-family: 'Ubuntu', 'Liberation Sans', Arial, sans-serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.5px;
        fill: #4b6070;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0);   }
      }
      @keyframes winIn {
        from { opacity: 0; transform: translate(-5px, 5px); }
        to   { opacity: 1; transform: translate(0, 0);      }
      }

      .g-win3 { animation: winIn   0.55s cubic-bezier(.4,0,.2,1) 0.05s both; }
      .g-win2 { animation: winIn   0.55s cubic-bezier(.4,0,.2,1) 0.18s both; }
      .g-win1 { animation: winIn   0.55s cubic-bezier(.4,0,.2,1) 0.32s both; }
      .g-text { animation: slideUp 0.60s cubic-bezier(.4,0,.2,1) 0.70s both; }
      .g-sub  { animation: slideUp 0.60s cubic-bezier(.4,0,.2,1) 0.90s both; }
    </style>
  </defs>

  <rect class="bg" width="560" height="200" rx="12"/>

  <!-- Window 3 (back) -->
  <g class="g-win3">
    <rect class="win3" x="22" y="52" width="118" height="88" rx="7"/>
  </g>

  <!-- Window 2 (mid) -->
  <g class="g-win2">
    <rect class="win2" x="32" y="40" width="118" height="88" rx="7"/>
  </g>

  <!-- Window 1 (front) -->
  <g class="g-win1">
    <rect class="win1" x="42" y="28" width="118" height="88" rx="7"/>
    <rect class="titlebar-fill" x="42" y="28" width="118" height="22" rx="7"/>
    <rect class="titlebar-fill" x="42" y="41"  width="118" height="9"/>
    <line class="titlebar-line" x1="42" y1="50" x2="160" y2="50"/>
    <circle cx="57"  cy="39" r="4.2" fill="rgba(34,211,238,0.55)"/>
    <circle cx="71"  cy="39" r="4.2" fill="rgba(34,211,238,0.30)"/>
    <circle cx="85"  cy="39" r="4.2" fill="rgba(34,211,238,0.14)"/>

    <!-- Row 1 -->
    <circle cx="58"  cy="62" r="3.2" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.85;0.12" dur="2.0s" repeatCount="indefinite" begin="0.0s"/><animate attributeName="r" values="2.8;4.2;2.8" dur="2.0s" repeatCount="indefinite" begin="0.0s"/></circle>
    <circle cx="72"  cy="62" r="2.8" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.70;0.12" dur="1.7s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="86"  cy="62" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.90;0.12" dur="2.3s" repeatCount="indefinite" begin="0.6s"/><animate attributeName="r" values="3.0;4.5;3.0" dur="2.3s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle cx="100" cy="62" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.12;0.75;0.12" dur="1.9s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="114" cy="62" r="3.2" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.80;0.12" dur="2.1s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="128" cy="62" r="2.8" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.65;0.12" dur="1.8s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle cx="142" cy="62" r="3.0" fill="#86efac"><animate attributeName="opacity" values="0.12;0.85;0.12" dur="2.4s" repeatCount="indefinite" begin="1.0s"/></circle>
    <!-- Row 2 -->
    <circle cx="58"  cy="76" r="2.8" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.78;0.12" dur="1.9s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="72"  cy="76" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="2.2s" repeatCount="indefinite" begin="0.1s"/><animate attributeName="r" values="3.0;4.5;3.0" dur="2.2s" repeatCount="indefinite" begin="0.1s"/></circle>
    <circle cx="86"  cy="76" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.12;0.68;0.12" dur="2.5s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="100" cy="76" r="3.2" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.85;0.12" dur="2.0s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="114" cy="76" r="2.8" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.72;0.12" dur="1.7s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle cx="128" cy="76" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.88;0.12" dur="2.3s" repeatCount="indefinite" begin="0.2s"/><animate attributeName="r" values="3.0;4.5;3.0" dur="2.3s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="142" cy="76" r="2.8" fill="#86efac"><animate attributeName="opacity" values="0.12;0.76;0.12" dur="1.9s" repeatCount="indefinite" begin="0.6s"/></circle>
    <!-- Row 3 -->
    <circle cx="58"  cy="90" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.88;0.12" dur="2.1s" repeatCount="indefinite" begin="0.7s"/><animate attributeName="r" values="3.0;4.5;3.0" dur="2.1s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="72"  cy="90" r="2.5" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.70;0.12" dur="1.8s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle cx="86"  cy="90" r="3.2" fill="#86efac"><animate attributeName="opacity" values="0.12;0.82;0.12" dur="2.4s" repeatCount="indefinite" begin="0.0s"/></circle>
    <circle cx="100" cy="90" r="2.8" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.78;0.12" dur="2.0s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="114" cy="90" r="3.5" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.90;0.12" dur="1.7s" repeatCount="indefinite" begin="0.5s"/><animate attributeName="r" values="3.0;4.5;3.0" dur="1.7s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="128" cy="90" r="2.5" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.72;0.12" dur="2.2s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="142" cy="90" r="3.0" fill="#86efac"><animate attributeName="opacity" values="0.12;0.85;0.12" dur="1.9s" repeatCount="indefinite" begin="1.0s"/></circle>
    <!-- Row 4 -->
    <circle cx="58"  cy="104" r="2.8" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.75;0.12" dur="2.3s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle cx="72"  cy="104" r="3.2" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.88;0.12" dur="1.8s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="86"  cy="104" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.12;0.68;0.12" dur="2.5s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle cx="100" cy="104" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="2.0s" repeatCount="indefinite" begin="0.1s"/><animate attributeName="r" values="3.0;4.5;3.0" dur="2.0s" repeatCount="indefinite" begin="0.1s"/></circle>
    <circle cx="114" cy="104" r="2.8" fill="#fbbf24"><animate attributeName="opacity" values="0.12;0.73;0.12" dur="1.9s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="128" cy="104" r="3.2" fill="#22d3ee"><animate attributeName="opacity" values="0.12;0.84;0.12" dur="2.1s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle cx="142" cy="104" r="2.5" fill="#86efac"><animate attributeName="opacity" values="0.12;0.78;0.12" dur="2.3s" repeatCount="indefinite" begin="0.0s"/></circle>
  </g>

  <!-- Wordmark -->
  <g class="g-text">
    <text class="brand-word" x="182" y="96">
      <tspan class="brand-main">GUI-</tspan><tspan class="brand-accent">DR</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g class="g-sub">
    <line class="divider" x1="182" y1="110" x2="544" y2="110"/>
    <text class="tagline" x="182" y="128">domain randomization for GUI agent stress testing</text>
  </g>

</svg>